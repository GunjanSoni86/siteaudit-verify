<!DOCTYPE html> 
  <html lang="en">                                                                                                                                                         
  <head>
      <meta charset="UTF-8">                                                                                                                                               
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Reset Password - Site Audit Pro</title>
      <style>                                                                                                                                                              
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body {                                                                                                                                                           
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              background-color: #f5f5f5;                                                                                                                                   
              display: flex;
              justify-content: center;                                                                                                                                     
              align-items: center;
              min-height: 100vh;
          }
          .container {
              background: white;
              padding: 40px;                                                                                                                                               
              border-radius: 12px;
              box-shadow: 0 2px 20px rgba(0,0,0,0.1);                                                                                                                      
              max-width: 400px;
              width: 90%;
              text-align: center;
          }                                                                                                                                                                
          h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
          p { font-size: 14px; color: #666; margin-bottom: 24px; }                                                                                                         
          input {                                                                                                                                                          
              width: 100%;
              padding: 14px 16px;                                                                                                                                          
              border: 1px solid #ddd;
              border-radius: 8px;
              font-size: 16px;
              margin-bottom: 16px;
              outline: none;                                                                                                                                               
          }
          input:focus { border-color: #4CAF50; }                                                                                                                           
          button {
              width: 100%;
              padding: 14px;
              background-color: #4CAF50;
              color: white;
              border: none;                                                                                                                                                
              border-radius: 8px;
              font-size: 16px;                                                                                                                                             
              font-weight: bold;
              cursor: pointer;
          }
          button:hover { background-color: #45a049; }
          button:disabled { background-color: #ccc; cursor: not-allowed; }                                                                                                 
          .error { color: #e53935; font-size: 14px; margin-bottom: 16px; display: none; }
          .success { color: #4CAF50; }                                                                                                                                     
          .hidden { display: none; }                                                                                                                                       
      </style>
  </head>                                                                                                                                                                  
  <body>          
      <div class="container" id="resetForm">
          <h1>Reset Password</h1>
          <p>Enter your new password below.</p>                                                                                                                            
          <p class="error" id="errorMsg"></p>
          <input type="password" id="newPassword" placeholder="New Password (min 8 characters)">                                                                           
          <input type="password" id="confirmPassword" placeholder="Confirm Password">                                                                                      
          <button id="resetBtn" onclick="resetPassword()">Reset Password</button>
      </div>                                                                                                                                                               
                  
      <div class="container hidden" id="successView">
          <h1>Password Reset! ✅</h1>
          <p class="success">Your password has been reset successfully. Open the Site Audit Pro app and login with your new password.</p>                                  
      </div>                                                                                                                                                               
                                                                                                                                                                           
      <div class="container hidden" id="errorView">                                                                                                                        
          <h1>Invalid Link ❌</h1>
          <p>This reset link is invalid or expired. Please request a new one from the app.</p>
      </div>                                                                                                                                                               
   
      <script>                                                                                                                                                             
          const urlParams = new URLSearchParams(window.location.search);
          const userId = urlParams.get('userId');
          const secret = urlParams.get('secret');

          // ⬇️  REPLACE THIS with your Appwrite endpoint and project ID                                                                                                    
          const ENDPOINT = 'https://fra.cloud.appwrite.io/v1';
          const PROJECT_ID = '69204c6200264a56bbe1';                                                                                                                   
                  
          if (!userId || !secret) {                                                                                                                                        
              document.getElementById('resetForm').classList.add('hidden');
              document.getElementById('errorView').classList.remove('hidden');                                                                                             
          }
                                                                                                                                                                           
          async function resetPassword() {
              const password = document.getElementById('newPassword').value;
              const confirm = document.getElementById('confirmPassword').value;
              const errorMsg = document.getElementById('errorMsg');
              const btn = document.getElementById('resetBtn');                                                                                                             
   
              errorMsg.style.display = 'none';                                                                                                                             
                  
              if (password.length < 8) {
                  errorMsg.textContent = 'Password must be at least 8 characters.';
                  errorMsg.style.display = 'block';                                                                                                                        
                  return;
              }                                                                                                                                                            
              if (password !== confirm) {
                  errorMsg.textContent = 'Passwords do not match.';
                  errorMsg.style.display = 'block';
                  return;                                                                                                                                                  
              }
                                                                                                                                                                           
              btn.disabled = true;
              btn.textContent = 'Resetting...';

              try {
                  const res = await fetch(ENDPOINT + '/account/recovery', {
                      method: 'PUT',                                                                                                                                       
                      headers: {
                          'Content-Type': 'application/json',                                                                                                              
                          'X-Appwrite-Project': PROJECT_ID,
                      },
                      body: JSON.stringify({
                          userId: userId,
                          secret: secret,                                                                                                                                  
                          password: password,
                      }),                                                                                                                                                  
                  });

                  if (res.ok) {
                      document.getElementById('resetForm').classList.add('hidden');
                      document.getElementById('successView').classList.remove('hidden');
                  } else {                                                                                                                                                 
                      const err = await res.json();
                      errorMsg.textContent = err.message || 'Reset failed. Link may have expired.';                                                                        
                      errorMsg.style.display = 'block';
                      btn.disabled = false;                                                                                                                                
                      btn.textContent = 'Reset Password';
                  }                                                                                                                                                        
              } catch (e) {
                  errorMsg.textContent = 'Network error. Please try again.';
                  errorMsg.style.display = 'block';
                  btn.disabled = false;                                                                                                                                    
                  btn.textContent = 'Reset Password';
              }                                                                                                                                                            
          }       
      </script>
  </body>
  </html>
